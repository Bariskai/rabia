<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rabiaaa Özrümü Kabul Eder misin? 🥺</title>
    <style>
        /* Temel Ayarlar ve Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a4a4a;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Ana Kart Tasarımı */
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(225, 112, 150, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 1.2s ease-out;
            position: relative;
        }

        /* Sevimli Animasyonlu Emoji alanı */
        .emoji-space {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 15px;
            font-weight: 600;
            line-height: 1.4;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #6c757d;
        }

        /* Vurgulu Alan */
        .excuse {
            background-color: #fff0f3;
            border-left: 4px solid #ff4d6d;
            padding: 12px;
            border-radius: 8px;
            font-style: italic;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* Buton Grubu */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
            align-items: center;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 77, 109, 0.4);
        }

        /* Kaçan Buton :) */
        .btn-no {
            background-color: #f8f9fa;
            color: #6c757d;
            position: relative;
            z-index: 10;
        }

        /* Kutlama Mesajı (Gizli) */
        .success-message {
            display: none;
            animation: scaleUp 0.5s ease-out forwards;
        }

        .success-message h2 {
            color: #2a9d8f;
            margin-bottom: 15px;
        }

        /* Animasyonlar */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Ana İçerik -->
        <div id="content-area">
            <div class="emoji-space">😴💤</div>
            <h1>Rabia, Uyuya Kaldığım ve ayak numaranı sorduğum için  Özrümü Kabul Eder misin?</h1>
            
            <div class="excuse">
                "Gerçekten isteyerek oldu, Lütfen affet! 🥺"
            </div>
            
            <p>Özrümü kabul edermisin</p>

            <div class="btn-group">
                <button class="btn btn-yes" onclick="accepted()">Evet ❤️</button>
                <button class="btn btn-no" id="noBtn" onmouseover="moveButton()">Hayır 💔</button>
            </div>
        </div>

        <!-- Başarılı Kabul Etme Ekranı -->
        <div id="success-area" class="success-message">
            <div style="font-size: 5rem;">🎉🥳</div>
            <h2>Teşşekür ederimm</h2>
            <p>Bir daha uyuya kalmayacağıma söz veremem  ✨</p>
        </div>
    </div>

    <script>
        // "Hayır" butonunun fare üstüne gelince kaçmasını sağlayan eğlenceli fonksiyon
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            
            // Ekran sınırları içinde rastgele yeni koordinatlar hesapla
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            // Butonun konumunu absolute yapıp ekranda uçuruyoruz
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // "Evet" butonuna basılınca tetiklenen fonksiyon
        function accepted() {
            document.getElementById('content-area').style.display = 'none';
            document.getElementById('success-area').style.display = 'block';
            
            // Ekrana konfeti efekti gibi tatlı arka plan rengi değişimi ekleyelim
            document.body.style.background = "linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%)";
        }
    </script>
</body>
</html>
